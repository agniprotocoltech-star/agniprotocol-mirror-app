name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Build APK
        run: |
          flutter create --org com.agniprotocol --project-name agniprotocol_mirror tmp_app
          cp lib/main.dart tmp_app/lib/main.dart
          cp pubspec.yaml tmp_app/pubspec.yaml
          cp android/app/src/main/AndroidManifest.xml tmp_app/android/app/src/main/AndroidManifest.xml
          cd tmp_app
          sed -i 's/minSdkVersion 19/minSdkVersion 23/' android/app/build.gradle
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: AgniProtocol-Mirror-APK
          path: tmp_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
