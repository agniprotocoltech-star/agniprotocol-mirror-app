name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Create Flutter project
        run: |
          flutter create --org com.agniprotocol --project-name agniprotocol_mirror tmp_app
          cp -r lib/* tmp_app/lib/
          cp pubspec.yaml tmp_app/pubspec.yaml
          cd tmp_app && flutter pub get
          flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: AgniProtocol-Mirror-APK
          path: tmp_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
